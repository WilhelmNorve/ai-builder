<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock with Fun Facts</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .hero-section {
            background-image: url('https://picsum.photos/seed/clocktower/1600/600');
            background-size: cover;
            background-position: center;
            text-align: center;
            padding: 60px 20px;
            color: #fff;
            font-size: 2em;
            font-weight: bold;
            text-shadow: 2px 2px 5px #000;
        }
        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
        }
        .clock-card {
            background-color: #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.2s ease;
        }
        .clock-card:hover {
            transform: scale(1.05);
        }
        .clock-display {
            font-size: 3em;
            margin: 20px 0;
            text-align: center;
            color: #00f5d4;
            text-shadow: 0 0 5px #00f5d4;
        }
        .timezone-label {
            font-size: 1.5em;
            text-align: center;
            margin-top: -10px;
        }
        .fun-fact {
            font-size: 1em;
            color: #aaa;
            padding: 10px 20px;
            text-align: center;
            background-color: #1e1e1e;
        }
        .time-number {
            display: inline-block;
            transition: all 0.5s ease-in-out;
        }
        a {
            color: #00f5d4;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        a:hover {
            color: #fff;
        }
        @media(max-width: 768px) {
            .clocks-grid {
                grid-template-columns: 1fr;
            }
        }
        @media(min-width: 769px) and (max-width: 1024px) {
            .clocks-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero-section">
            World Clock with Fun Facts
        </div>
        <div class="clocks-grid">
            <div class="clock-card">
                <img src="https://picsum.photos/seed/newyork/300/150" alt="New York" />
                <div class="clock-display" id="clock-newyork"></div>
                <div class="timezone-label">New York</div>
                <div class="fun-fact">New York City has over 8.3 million people and never truly sleeps!</div>
            </div>
            <div class="clock-card">
                <img src="https://picsum.photos/seed/tokyo/300/150" alt="Tokyo" />
                <div class="clock-display" id="clock-tokyo"></div>
                <div class="timezone-label">Tokyo</div>
                <div class="fun-fact">Tokyo is home to the world's busiest train station - Shinjuku!</div>
            </div>
            <div class="clock-card">
                <img src="https://picsum.photos/seed/oslo/300/150" alt="Oslo" />
                <div class="clock-display" id="clock-oslo"></div>
                <div class="timezone-label">Oslo</div>
                <div class="fun-fact">Oslo is surrounded by forests and has 40 islands within city limits!</div>
            </div>
        </div>
    </div>
    <script>
        function updateClocks() {
            try {
                const now = new Date();
                const timeZones = [
                    { id: 'clock-newyork', timeZone: 'America/New_York' },
                    { id: 'clock-tokyo', timeZone: 'Asia/Tokyo' },
                    { id: 'clock-oslo', timeZone: 'Europe/Oslo' }
                ];
                
                timeZones.forEach(zone => {
                    const options = { timeZone: zone.timeZone, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
                    const formatter = new Intl.DateTimeFormat('en-US', options);
                    const timeString = formatter.format(now);
                    
                    const clockEl = document.getElementById(zone.id);
                    if (clockEl) clockEl.textContent = timeString;
                });
            } catch (e) {
                showError('Failed to update the clocks. Please try again.');
            }
        }

        function showError(message) {
            alert(message);
        }

        function startClock() {
            updateClocks();
            setInterval(updateClocks, 1000);
        }

        window.onload = function() {
            startClock();
        }
    </script>
</body>
</html>
