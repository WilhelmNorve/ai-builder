<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Car Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #fff;
        }
        .hero-section {
            position: relative;
            width: 100%;
            height: 600px;
            background-image: url('https://picsum.photos/seed/hero/1600/600');
            background-size: cover;
            background-position: center;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero-text {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 8px;
            font-size: 28px;
        }
        .nav-menu {
            background-color: #1f2937;
            display: flex;
            justify-content: center;
            padding: 10px 0;
        }
        .nav-menu a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 15px;
            padding: 10px;
            transition: color 0.3s ease;
        }
        .nav-menu a:hover {
            text-decoration: underline;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 40px;
            background-color: #1f2937;
        }
        .car-card {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        .car-card:hover {
            transform: scale(1.05);
        }
        .car-image {
            width: 100%;
            height: auto;
            display: block;
        }
        .footer {
            background-color: #1f2937;
            color: #94a3b8;
            text-align: center;
            padding: 20px;
        }
        .error-message {
            background: #fee2e2;
            border: 1px solid #f87171;
            color: #b91c1c;
            padding: 12px;
            border-radius: 6px;
            margin: 20px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <nav class="nav-menu">
            <a href="https://www.ferrari.com" target="_blank">Ferrari</a>
            <a href="https://www.lamborghini.com" target="_blank">Lamborghini</a>
            <a href="https://www.porsche.com" target="_blank">Porsche</a>
        </nav>
    </header>

    <section class="hero-section">
        <div class="hero-text">Welcome to the Sports Car Gallery</div>
    </section>

    <div class="error-message" id="error-message"></div>

    <section class="gallery-grid" id="gallery">
        <div class="car-card">
            <img class="car-image" src="https://loremflickr.com/400/300/lamborghini" alt="Lamborghini" onerror="this.style.display='none'; this.parentElement.style.background='linear-gradient(135deg,#1e293b,#334155)'">
        </div>
        <div class="car-card">
            <img class="car-image" src="https://loremflickr.com/400/300/porsche" alt="Porsche" onerror="this.style.display='none'; this.parentElement.style.background='linear-gradient(135deg,#1e293b,#334155)'">
        </div>
        <div class="car-card">
            <img class="car-image" src="https://loremflickr.com/400/300/mclaren" alt="McLaren" onerror="this.style.display='none'; this.parentElement.style.background='linear-gradient(135deg,#1e293b,#334155)'">
        </div>
        <div class="car-card">
            <img class="car-image" src="https://loremflickr.com/400/300/bugatti" alt="Bugatti" onerror="this.style.display='none'; this.parentElement.style.background='linear-gradient(135deg,#1e293b,#334155)'">
        </div>
        <div class="car-card">
            <img class="car-image" src="https://loremflickr.com/400/300/aston-martin" alt="Aston Martin" onerror="this.style.display='none'; this.parentElement.style.background='linear-gradient(135deg,#1e293b,#334155)'">
        </div>
    </section>

    <footer class="footer">
        Images provided by <a href="https://loremflickr.com" target="_blank">Lorem Flickr</a>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            initializeGallery();
        });

        function initializeGallery() {
            try {
                const gallery = document.getElementById('gallery');
                if (!gallery) throw new Error('Gallery element not found.');
            } catch (error) {
                showError(error.message);
            }
        }

        function showError(message) {
            const errorMessage = document.getElementById('error-message');
            if (errorMessage) {
                errorMessage.textContent = message;
                errorMessage.style.display = 'block';
            }
        }
    </script>

</body>
</html>
