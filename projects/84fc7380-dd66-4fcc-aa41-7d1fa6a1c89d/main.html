<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Time Zones</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            color: white;
            background: linear-gradient(145deg, #2a2a72, #009ffd);
        }
        header {
            background-image: url('https://picsum.photos/seed/worldmap/1200/400');
            background-size: cover;
            text-align: center;
            padding: 100px 20px;
            color: white;
            position: relative;
        }
        header::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }
        header h1 {
            position: relative;
            z-index: 2;
            font-size: 3em;
        }
        main {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 20px;
            padding: 20px 0;
        }
        .clock-card {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .clock-card:hover {
            transform: scale(1.05);
        }
        canvas {
            display: block;
            margin: 0 auto;
            padding: 20px 0;
        }
        h2 {
            text-align: center;
            margin: 10px 0;
        }
        p {
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            margin: 0;
            font-size: 0.9em;
        }
        figcaption {
            padding: 10px;
            font-size: 0.9em;
            background: rgba(0, 0, 0, 0.3);
        }
        footer {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
        }
        a {
            color: #ffd700;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        a:hover {
            text-decoration: underline;
            color: #ffcc00;
        }
        @media (max-width: 768px) {
            main {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>World Time Zones</h1>
    </header>
    <main>
        <section class="clock-card">
            <canvas id="clock1" width="200" height="200"></canvas>
            <h2>New York, USA</h2>
            <p>The Big Apple - America's largest city and global financial hub</p>
            <figure>
                <img src="https://picsum.photos/seed/newyork/300/200" alt="New York">
                <figcaption>New York City has over 8.3 million people but fits into an area smaller than Tokyo. The Statue of Liberty was originally copper-colored and turned green due to oxidation over 30 years!</figcaption>
            </figure>
        </section>
        <section class="clock-card">
            <canvas id="clock2" width="200" height="200"></canvas>
            <h2>Tokyo, Japan</h2>
            <p>The world's largest metropolitan area with cutting-edge technology</p>
            <figure>
                <img src="https://picsum.photos/seed/tokyo/300/200" alt="Tokyo">
                <figcaption>Tokyo has more Michelin-starred restaurants than Paris and London combined! The city also has themed cafés for everything - from cats and owls to robots and ninjas.</figcaption>
            </figure>
        </section>
        <section class="clock-card">
            <canvas id="clock3" width="200" height="200"></canvas>
            <h2>Sydney, Australia</h2>
            <p>Australia's harbor city famous for its iconic Opera House and bridge</p>
            <figure>
                <img src="https://picsum.photos/seed/sydney/300/200" alt="Sydney">
                <figcaption>Sydney Harbour Bridge is nicknamed 'The Coathanger' and you can climb to its summit! The city is also home to the world's largest natural harbor and some of the most venomous spiders.</figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <p>Current location: Unknown</p>
    </footer>
    <script>
        function drawClock(id, timezone) {
            const canvas = document.getElementById(id);
            if (!canvas.getContext) return;
            const ctx = canvas.getContext('2d');
            const radius = canvas.height / 2;
            ctx.translate(radius, radius);

            function drawFace(ctx, radius) {
                ctx.beginPath();
                ctx.arc(0, 0, radius, 0, 2 * Math.PI);
                ctx.fillStyle = 'white';
                ctx.fill();
                const grad = ctx.createRadialGradient(0, 0, radius * 0.95, 0, 0, radius * 1.05);
                grad.addColorStop(0, '#333');
                grad.addColorStop(0.5, 'white');
                grad.addColorStop(1, '#333');
                ctx.strokeStyle = grad;
                ctx.lineWidth = radius * 0.1;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(0, 0, radius * 0.1, 0, 2 * Math.PI);
                ctx.fillStyle = '#333';
                ctx.fill();
            }

            function drawNumbers(ctx, radius) {
                const ang;
                const num;
                ctx.font = radius * 0.15 + "px arial";
                ctx.textBaseline = "middle";
                ctx.textAlign = "center";
                for (num = 1; num < 13; num++) {
                    ang = num * Math.PI / 6;
                    ctx.rotate(ang);
                    ctx.translate(0, -radius * 0.85);
                    ctx.rotate(-ang);
                    ctx.fillText(num.toString(), 0, 0);
                    ctx.rotate(ang);
                    ctx.translate(0, radius * 0.85);
                    ctx.rotate(-ang);
                }
            }

            function drawTime(ctx, radius, timezone) {
                const now = new Date();
                const timeOptions = { timeZone: timezone, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
                const timeString = now.toLocaleString('en-US', timeOptions);
                const [hour, minute, second] = timeString.split(/:| /).map(Number);

                const hourPos = (hour % 12) * Math.PI / 6 + (minute * Math.PI / (6 * 60)) + (second * Math.PI / (360 * 60));
                drawHand(ctx, hourPos, radius * 0.5, radius * 0.07);
                
                const minutePos = (minute * Math.PI / 30) + (second * Math.PI / (30 * 60));
                drawHand(ctx, minutePos, radius * 0.8, radius * 0.07);
                
                const secondPos = second * Math.PI / 30;
                drawHand(ctx, secondPos, radius * 0.9, radius * 0.02, '#ff0000');
            }

            function drawHand(ctx, pos, length, width, color = '#000000') {
                ctx.beginPath();
                ctx.lineWidth = width;
                ctx.lineCap = "round";
                ctx.strokeStyle = color;
                ctx.moveTo(0, 0);
                ctx.rotate(pos);
                ctx.lineTo(0, -length);
                ctx.stroke();
                ctx.rotate(-pos);
            }

            function updateClock() {
                ctx.clearRect(-radius, -radius, canvas.width, canvas.height);
                drawFace(ctx, radius);
                drawNumbers(ctx, radius);
                drawTime(ctx, radius, timezone);
            }

            setInterval(updateClock, 1000);
            updateClock(); // Initial call to avoid delay
        }

        drawClock('clock1', 'America/New_York');
        drawClock('clock2', 'Asia/Tokyo');
        drawClock('clock3', 'Australia/Sydney');
    </script>
</body>
</html>
