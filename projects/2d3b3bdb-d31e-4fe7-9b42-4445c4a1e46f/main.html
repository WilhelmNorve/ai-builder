<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            margin: 0;
        }
        .calculator {
            width: 260px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .display {
            background-color: #222;
            color: #fff;
            font-size: 2em;
            padding: 10px;
            text-align: right;
            border-bottom: 1px solid #888;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
        }
        .button {
            padding: 20px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            text-align: center;
            font-size: 1.2em;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .button:hover {
            background-color: #ddd;
        }
        .button:active {
            background-color: #ccc;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div id="display" class="display">0</div>
        <div class="buttons">
            <div class="button" onclick="clearDisplay()">C</div>
            <div class="button" onclick="displayNumber('')"></div>
            <div class="button" onclick="displayNumber('')"></div>
            <div class="button" onclick="setOperation('dele')">÷</div>

            <div class="button" onclick="displayNumber('7')">7</div>
            <div class="button" onclick="displayNumber('8')">8</div>
            <div class="button" onclick="displayNumber('9')">9</div>
            <div class="button" onclick="setOperation('gange')">×</div>

            <div class="button" onclick="displayNumber('4')">4</div>
            <div class="button" onclick="displayNumber('5')">5</div>
            <div class="button" onclick="displayNumber('6')">6</div>
            <div class="button" onclick="setOperation('minus')">−</div>

            <div class="button" onclick="displayNumber('1')">1</div>
            <div class="button" onclick="displayNumber('2')">2</div>
            <div class="button" onclick="displayNumber('3')">3</div>
            <div class="button" onclick="setOperation('pluss')">+</div>

            <div class="button" onclick="displayNumber('0')">0</div>
            <div class="button" onclick="addDecimal()">.</div>
            <div class="button" onclick="calculate()">=</div>
        </div>
    </div>

    <script>
        let currentValue = '';
        let previousValue = '';
        let currentOperation = '';
        let isDecimalUsed = false;

        function displayNumber(num) {
            if (currentValue.length < 16) {
                currentValue += num;
                updateDisplay();
            }
        }

        function setOperation(op) {
            if (currentValue !== '') {
                if (previousValue !== '') {
                    calculate();
                }
                currentOperation = op;
                previousValue = currentValue;
                currentValue = '';
                isDecimalUsed = false;
            }
        }

        function calculate() {
            if (currentOperation && currentValue !== '') {
                let result;
                const prev = parseFloat(previousValue);
                const curr = parseFloat(currentValue);
                
                switch (currentOperation) {
                    case 'pluss':
                        result = prev + curr;
                        break;
                    case 'minus':
                        result = prev - curr;
                        break;
                    case 'gange':
                        result = prev * curr;
                        break;
                    case 'dele':
                        if (curr === 0) {
                            result = 'Error';
                        } else {
                            result = prev / curr;
                        }
                        break;
                    default:
                        return;
                }
                currentValue = result.toString().substr(0, 16);
                previousValue = '';
                currentOperation = '';
                updateDisplay();
            }
        }

        function clearDisplay() {
            currentValue = '';
            previousValue = '';
            currentOperation = '';
            isDecimalUsed = false;
            updateDisplay();
        }

        function addDecimal() {
            if (!isDecimalUsed) {
                if (currentValue === '') {
                    currentValue = '0.';
                } else {
                    currentValue += '.';
                }
                isDecimalUsed = true;
                updateDisplay();
            }
        }

        function updateDisplay() {
            document.getElementById('display').textContent = currentValue || '0';
        }
    </script>
</body>
</html>
