<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Powered Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c2f33;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .calculator, .ai-section {
            background-color: #23272a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .display, .ai-input, .examples {
            width: 100%;
            height: 40px;
            margin-bottom: 10px;
            border-radius: 4px;
            border: 1px solid #99aab5;
            padding: 5px 10px;
            color: #23272a;
            background-color: #ffffff;
        }
        .button {
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #7289da;
            color: #ffffff;
            font-size: 16px;
        }
        .button:hover {
            background-color: #99aab5;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .ai-response {
            background-color: #99aab5;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            color: #23272a;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" class="display" disabled>
        <div class="grid">
            <button class="button" onclick="clearEntry()">C</button>
            <button class="button" onclick="allClear()">AC</button>
            <button class="button" onclick="backspace()">←</button>
            <button class="button" onclick="appendOperator('/')">÷</button>
            <button class="button" onclick="appendNumber(7)">7</button>
            <button class="button" onclick="appendNumber(8)">8</button>
            <button class="button" onclick="appendNumber(9)">9</button>
            <button class="button" onclick="appendOperator('*')">×</button>
            <button class="button" onclick="appendNumber(4)">4</button>
            <button class="button" onclick="appendNumber(5)">5</button>
            <button class="button" onclick="appendNumber(6)">6</button>
            <button class="button" onclick="appendOperator('-')">-</button>
            <button class="button" onclick="appendNumber(1)">1</button>
            <button class="button" onclick="appendNumber(2)">2</button>
            <button class="button" onclick="appendNumber(3)">3</button>
            <button class="button" onclick="appendOperator('+')">+</button>
            <button class="button" onclick="appendNumber(0)">0</button>
            <button class="button" onclick="appendDecimal()">.</button>
            <button class="button" style="grid-column: span 2" onclick="calculateResult()">=</button>
        </div>
    </div>
    <div class="ai-section">
        <input type="text" id="ai-input" class="ai-input" placeholder="Type your query...">
        <button class="button" onclick="processAIQuery()">Ask AI</button>
        <div class="examples">Examples: "15% of 200", "Convert 32 F to C"</div>
        <div id="ai-response" class="ai-response" style="display: none;"></div>
    </div>
    <script>
        const display = document.getElementById('display');

        function appendNumber(number) {
            display.value += number;
        }

        function appendOperator(operator) {
            if (display.value && !isNaN(display.value.slice(-1))) {
                display.value += operator;
            }
        }

        function appendDecimal() {
            if (!display.value.includes('.')) {
                display.value += '.';
            }
        }

        function calculateResult() {
            try {
                display.value = eval(display.value.replace('÷', '/').replace('×', '*'));
            } catch {
                display.value = "Error";
            }
        }

        function backspace() {
            display.value = display.value.slice(0, -1);
        }

        function clearEntry() {
            display.value = '';
        }

        function allClear() {
            display.value = '';
        }

        function processAIQuery() {
            const input = document.getElementById('ai-input').value.toLowerCase();
            const responseDiv = document.getElementById('ai-response');
            let response = "I didn't understand that query.";

            try {
                if (input.includes('percent of')) {
                    const [, percent, , number] = input.match(/(\d+)% of (\d+)/) || [];
                    if (percent && number) {
                        response = `${percent}% of ${number} is ${number * (percent / 100)}`;
                    }
                } else if (input.includes('square root of')) {
                    const [, number] = input.match(/square root of (\d+)/) || [];
                    if (number) {
                        response = `The square root of ${number} is ${Math.sqrt(number)}`;
                    }
                } else if (input.includes('to the power of')) {
                    const [, base, , exp] = input.match(/(\d+) to the power of (\d+)/) || [];
                    if (base && exp) {
                        response = `${base} to the power of ${exp} is ${Math.pow(base, exp)}`;
                    }
                } else if (input.includes('convert') && input.includes('fahrenheit to celsius')) {
                    const [, fahrenheit] = input.match(/(\d+)\s*f/) || [];
                    if (fahrenheit) {
                        const celsius = (fahrenheit - 32) * 5 / 9;
                        response = `${fahrenheit} Fahrenheit is ${celsius.toFixed(2)} Celsius`;
                    }
                } else if (input.match(/\d+ (plus|minus|times|divided by) \d+/)) {
                    const operationMap = {
                        'plus': '+',
                        'minus': '-',
                        'times': '*',
                        'divided by': '/'
                    };
                    let expression = input;
                    for (const [word, symbol] of Object.entries(operationMap)) {
                        expression = expression.replace(word, symbol);
                    }
                    const result = eval(expression.match(/\d+ [+|\-|*|\/] \d+/)[0]);
                    response = `${input} is equal to ${result}`;
                }
            } catch {
                response = "Error in processing the query.";
            }

            responseDiv.innerText = response;
            responseDiv.style.display = 'block';
        }
    </script>
</body>
</html>
